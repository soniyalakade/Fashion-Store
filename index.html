    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Store</title>

    <!-- Bootstrap CSS CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
    </head>

    <body>

    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <section class="hero-slider">
    <div class="hero-slide active"
        style="background-image:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d');">
    </div>

    <div class="hero-slide"
        style="background-image:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('https://images.unsplash.com/photo-1483985988355-763728e1935b');">
    </div>

    <div class="hero-slide"
        style="background-image:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('https://images.unsplash.com/photo-1445205170230-053b83016050');">
    </div>

    <!-- HERO TEXT -->
    <div class="hero-content text-center text-white">
        <h1 class="display-4 fw-bold">Upgrade Your Style</h1>
        <p class="lead">Discover the latest fashion trends</p>
        <a href="#products" class="btn btn-primary btn-lg mt-2">
        Shop Now
        </a>
    </div>
    </section>

    <!-- Products Section -->
    <section class="container my-5 pt-4" id="products">
        <h2 class="text-center mb-4">Our Products</h2>
        <div class="row" id="product-list">
        <!-- Products injected by JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center py-4">
        &copy; 2026 <strong>FashionStore</strong>. All rights reserved.
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>

    <!-- Navbar Loader -->
    <script src="components/navbar.js"></script>

    </body>
    </html>
